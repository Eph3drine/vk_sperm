<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Посещаемость</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>Посещаемость</h1>

      <section id="auth-section" class="card">
        <h2>Вход</h2>
        <form id="login-form">
          <label>
            Логин
            <input id="login-id" type="text" required autocomplete="username" />
          </label>

          <label>
            Пароль
            <input id="login-password" type="password" required autocomplete="current-password" />
          </label>

          <button type="submit">Войти</button>
        </form>
      </section>

      <section id="app-section" class="card hidden">
        <div class="toolbar">
          <div class="toolbar-info">
            <p id="user-line"></p>
            <p id="week-line"></p>
          </div>
          <button id="logout-btn" class="secondary">Выйти</button>
        </div>

        <label class="date-label">
          Дата
          <input id="date-input" type="date" />
        </label>

        <div id="lessons-box"></div>

        <div id="headman-section" class="hidden card soft">
          <div class="headman-title-row">
            <h3>Группа за выбранную дату</h3>
            <button id="refresh-day-btn" class="secondary" type="button">Обновить</button>
          </div>
          <div id="headman-report"></div>
        </div>
      </section>
    </main>

    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
    <script src="/static/app.js"></script>
  </body>
</html>
